name: quizz-cours-ia

services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c ":> /dev/tcp/127.0.0.1/6333" || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      VLLM_BASE_URL: http://vllm:8000/v1
      EMBEDDINGS_BASE_URL: http://infinity:7997
      SQLITE_PATH: /app/data/memory.db
    networks:
      - default
      - vllm_net
      - embeddings_net
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - '4190:80'
    depends_on:
      - api
    restart: unless-stopped

  cli:
    build:
      context: .
      dockerfile: packages/cli/Dockerfile
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      VLLM_BASE_URL: http://vllm:8000/v1
      EMBEDDINGS_BASE_URL: http://infinity:7997
    networks:
      - default
      - vllm_net
      - embeddings_net
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    stdin_open: true
    tty: true
    profiles:
      - cli

volumes:
  qdrant_data:

networks:
  default:
  vllm_net:
    name: rag-local_default
    external: true
  embeddings_net:
    name: embeddings_default
    external: true
