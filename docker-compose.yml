services:
  chromadb:
    image: chromadb/chroma:0.5.20
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      chromadb:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - ./data:/app/data
      - ./.chroma:/app/.chroma
    tty: true
    stdin_open: true

volumes:
  chroma_data:
