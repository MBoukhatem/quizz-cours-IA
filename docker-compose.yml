services:
  chromadb:
    image: chromadb/chroma:0.5.20
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      chromadb:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - ./data:/app/data
      - ./.chroma:/app/.chroma
      - hf_cache:/app/.hf_cache
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      args:
        VITE_API_PROXY: http://api:8000
    depends_on:
      - api
    ports:
      - "5173:5173"

  cli:
    image: quizz-cours-ia-api:latest
    profiles: ["cli"]
    depends_on:
      chromadb:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - ./data:/app/data
      - ./.chroma:/app/.chroma
      - hf_cache:/app/.hf_cache
    tty: true
    stdin_open: true
    command: ["python", "-m", "app.main"]

volumes:
  chroma_data:
  hf_cache:
